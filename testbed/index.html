<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testbed</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, #17233e 0%, #05070c 55%, #020304 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      .label {
        position: fixed;
        top: 1rem;
        left: 1rem;
        padding: 0.65rem 0.85rem;
        color: #dfe8ff;
        background: rgb(7 10 18 / 60%);
        border: 1px solid rgb(143 170 255 / 30%);
        border-radius: 999px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.7rem;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div class="label">Testbed</div>
    <div id="app"></div>
    <script type="module" src="./planet.ts"></script>
  </body>
</html>
